<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculator</title>
</head>
<body>
    <div class="title">CALCULATOR</div>
    <div class="calculator">
        <div class="display1"></div>
        <div class="keypad">
            <div class="row">
                <button class="number1 number2 seven" value="7">7</button>
                <button class="number1 number2 eight" value="8">8</button>
                <button class="number1 number2 nine" value="9">9</button>
                <button class="operators divide" value="/">/</button>
            </div>
             <div class="row">
                <button class="number1 number2 four" value="4">4</button>
                <button class="number1 number2 five" value="5">5</button>
                <button class="number1 number2 six" value="6">6</button>
                <button class="operators multiply" value="*">*</button>
            </div>
             <div class="row">
                <button class="number1 number2 three" value="3">3</button>
                <button class="number1 number2 two" value="2">2</button>
                <button class="number1 number2 one" value="1">1</button>
                <button class="operators add" value="+">+</button>
            </div>
             <div class="row">
                <button class="clear" value=""clear>AC</button>
                <button class="number1 number2 zero" value="0">0</button>
                <button class="equalsto" value="=">=</button>
                <button class="operators subtract" value="-">-</button>
            </div>
        </div>
        <!-- <div class="display"></div> -->
    </div>
    <script src="script.js"></script>
</body>
</html>
